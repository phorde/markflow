services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - markflow-net

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - markflow-net

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      PYTHONPATH: /app
      REDIS_URL: redis://redis:6379/0
      WORKER_HEALTH_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: "8001"
      WORKER_LOOP_SLEEP_SECONDS: "2.0"
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - markflow-net

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        NEXT_PUBLIC_MARKFLOW_API_URL: http://127.0.0.1:8000
    environment:
      NEXT_PUBLIC_MARKFLOW_API_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - markflow-net

networks:
  markflow-net:
    driver: bridge
