name: CI

on:
  push:
  pull_request:

jobs:
  service-boundaries:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web]" -r requirements-dev.txt

      - name: Check service boundaries
        run: python scripts/check_service_boundaries.py

  service-runtime-checks:
    needs: service-boundaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: API dependency install
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api/requirements.txt

      - name: Worker dependency install
        run: pip install -r services/worker/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend npm ci + build
        working-directory: services/frontend
        run: |
          npm ci
          npm run build

      - name: Docker compose config validation
        run: docker compose -f docker-compose.yml config -q

  test:
    needs: [service-boundaries, service-runtime-checks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[web]" -r requirements-dev.txt

      - name: Console script smoke test
        run: markflow --help

      - name: Compile
        run: python -m compileall -q app.py markflow tests services scripts

      - name: Ruff
        run: python -m ruff check .

      - name: Black
        run: python scripts/run_with_timeout.py 120 -- python -m black --check --no-cache .

      - name: Flake8
        run: python -m flake8 app.py markflow tests services scripts

      - name: Mypy
        run: python -m mypy markflow services scripts

      - name: Unit tests
        run: python -m pytest -m unit --no-cov

      - name: Integration tests
        run: python -m pytest -m "integration and not slow" --no-cov

      - name: Functional tests
        run: python -m pytest -m functional --no-cov

      - name: Spec traceability
        run: python -m pytest -m spec --no-cov

      - name: Coverage gate
        run: |
          python -m pytest -q
          python -m coverage report --fail-under=100
